name: Deploy InstagramBot to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_DIR: /opt/InstagramYtBot
  SERVICE_NAME: instagramytbot

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to VPS
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      
      - name: 🔗 Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: 🚀 Deploy to VPS
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          WHITELIST_USERS: ${{ secrets.WHITELIST_USERS || '' }}
          STORAGE_DAYS: ${{ vars.STORAGE_DAYS || '2' }}
          MAX_TELEGRAM_SIZE_MB: ${{ vars.MAX_TELEGRAM_SIZE_MB || '50' }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            
            PROJECT_DIR="/opt/InstagramYtBot"
            SERVICE_NAME="instagramytbot"
            
            echo "========================================"
            echo "  InstagramYtBot Deployment"
            echo "========================================"
            
            if systemctl is-active --quiet $SERVICE_NAME; then
              echo "⏹️  Stopping $SERVICE_NAME..."
              systemctl stop $SERVICE_NAME
              sleep 2
            fi
            
            echo "📦 Installing dependencies..."
            apt-get update -qq
            apt-get install -y -qq python3 python3-pip python3-venv ffmpeg
            
            if [ -d "$PROJECT_DIR/.git" ]; then
              echo "📥 Pulling latest code..."
              cd "$PROJECT_DIR"
              git fetch origin
              git reset --hard origin/master
              git clean -fd
            else
              echo "📥 Cloning repository..."
              git clone --branch master https://github.com/YOUR_USERNAME/InstagramYtBot.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            fi
            
            echo "🐍 Setting up Python..."
            [ -d venv ] && rm -rf venv
            python3 -m venv venv
            $PROJECT_DIR/venv/bin/pip install --upgrade pip -q
            $PROJECT_DIR/venv/bin/pip install -r requirements.txt -q
            
            mkdir -p "$PROJECT_DIR/data/cookies" "$PROJECT_DIR/downloads"
            mkdir -p /var/log/$SERVICE_NAME
            
            echo "🔧 Creating service..."
            cat > /etc/systemd/system/$SERVICE_NAME.service << SERVICEEOF
            [Unit]
            Description=InstagramYtBot - Instagram Downloader
            After=network.target
            
            [Service]
            Type=simple
            User=root
            WorkingDirectory=$PROJECT_DIR
            Environment=PATH=$PROJECT_DIR/venv/bin:/usr/local/bin:/usr/bin:/bin
            Environment=BOT_TOKEN=${BOT_TOKEN}
            Environment=BASE_DOWNLOAD_LINK=${BASE_URL}
            Environment=WHITELIST_USERS=${WHITELIST_USERS}
            Environment=STORAGE_DAYS=${STORAGE_DAYS}
            Environment=MAX_TELEGRAM_FILE_SIZE=${MAX_TELEGRAM_SIZE_MB}
            ExecStart=$PROJECT_DIR/venv/bin/python $PROJECT_DIR/bot.py
            Restart=on-failure
            RestartSec=10
            StandardOutput=append:/var/log/$SERVICE_NAME/bot.log
            StandardError=append:/var/log/$SERVICE_NAME/bot_error.log
            
            [Install]
            WantedBy=multi-user.target
            SERVICEEOF
            
            systemctl daemon-reload
            systemctl enable $SERVICE_NAME
            
            echo "▶️  Starting service..."
            systemctl start $SERVICE_NAME
            sleep 5
            
            if systemctl is-active --quiet $SERVICE_NAME; then
              echo "✅ Service is running!"
              systemctl status $SERVICE_NAME --no-pager -l
            else
              echo "❌ Service failed!"
              echo "=== Error Log ==="
              tail -20 /var/log/$SERVICE_NAME/bot_error.log 2>/dev/null || true
              echo "=== Journal ==="
              journalctl -u $SERVICE_NAME -n 20 --no-pager || true
              exit 1
            fi
            
            echo "✅ Deployment Complete!"
          EOF